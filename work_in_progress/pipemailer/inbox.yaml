Screens:
  scr_Inbox:
    Properties:
      Fill: =RGBA(245, 247, 250, 1)
      OnVisible: |
        =ClearCollect(
            colInboxEmails,
            Office365Outlook.GetEmails(
                {
                    folderPath: "Inbox",
                    top: 50,
                    fetchOnlyUnread: false,
                    includeAttachments: false
                }
            )
        );
        Set(gblSelectedEmail, First(colInboxEmails));
        Set(gblInboxFilter, "All");
        Set(gblInboxSearch, "");
        ClearCollect(
            colPipelineStages,
            Table(
                {id: 1,  name: "CR Initial enquiry & Fact finding",  pipeline_name: "Customer returns"},
                {id: 2,  name: "CR Awaiting authorisation",          pipeline_name: "Customer returns"},
                {id: 3,  name: "CR Authorised",                      pipeline_name: "Customer returns"},
                {id: 4,  name: "CR Collection raised & issued",      pipeline_name: "Customer returns"},
                {id: 5,  name: "CR Goods back at Warehouse",         pipeline_name: "Customer returns"},
                {id: 6,  name: "CR Credit raised",                   pipeline_name: "Customer returns"},
                {id: 7,  name: "VR Initial vendor contact",          pipeline_name: "Vendor returns"},
                {id: 8,  name: "VR Awaiting authorisation",          pipeline_name: "Vendor returns"},
                {id: 9,  name: "VR Authorised",                      pipeline_name: "Vendor returns"},
                {id: 10, name: "VR Stock transfer raised",           pipeline_name: "Vendor returns"},
                {id: 11, name: "VR Goods shipped/collected",         pipeline_name: "Vendor returns"},
                {id: 12, name: "VR Credit note received",            pipeline_name: "Vendor returns"},
                {id: 13, name: "RR Initial Vendor Contact",          pipeline_name: "Repair Returns"},
                {id: 14, name: "RR Awaiting Authorisation",          pipeline_name: "Repair Returns"},
                {id: 15, name: "RR Authorised",                      pipeline_name: "Repair Returns"},
                {id: 16, name: "RR Stock Transfer Raised",           pipeline_name: "Repair Returns"},
                {id: 17, name: "RR Goods Shipped/Collected",         pipeline_name: "Repair Returns"},
                {id: 18, name: "RR Goods returned back from Vendor", pipeline_name: "Repair Returns"},
                {id: 19, name: "RR Goods shipped back to customer",  pipeline_name: "Repair Returns"},
                {id: 20, name: "Graded Stock Initial Investigation", pipeline_name: "Graded Stock"},
                {id: 21, name: "Graded Stock Decision Made",         pipeline_name: "Graded Stock"}
            )
        )
    Children:
      - vcon_inboxShell_1:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - hcon_inboxTopBar_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(15, 23, 42, 1)
                  FillPortions: =0
                  Height: =56
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =12
                  PaddingLeft: =20
                  PaddingRight: =20
                Children:
                  - lbl_inboxAppName_1:
                      Control: Text@0.0.51
                      Properties:
                        FontColor: =RGBA(255, 255, 255, 1)
                        Size: =18
                        Text: |-
                          ="📬  My Inbox"
                        VerticalAlign: =VerticalAlign.Middle
                        Weight: ='TextCanvas.Weight'.Bold
                        Width: =160
                  - txt_inboxSearch_1:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(71, 85, 105, 1)
                        Default: =gblInboxSearch
                        Fill: =RGBA(30, 41, 59, 1)
                        FillPortions: =1
                        HintText: ="Search emails…"
                        HoverBorderColor: =RGBA(147, 197, 253, 1)
                        OnChange: =Set(gblInboxSearch, Self.Text)
                  - lbl_emailCount_1:
                      Control: Text@0.0.51
                      Properties:
                        FontColor: =RGBA(148, 163, 184, 1)
                        Size: =12
                        Text: =Text(CountRows(colInboxEmails)) & " emails"
                        VerticalAlign: =VerticalAlign.Middle
                        Width: =80
                  - btn_inboxRefresh_1:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        Icon: ="ArrowSync"
                        Layout: ='ButtonCanvas.Layout'.IconOnly
                        OnSelect: |-
                          =ClearCollect(
                              colInboxEmails,
                              Office365Outlook.GetEmails(
                                  {
                                      folderPath: "Inbox",
                                      top: 50,
                                      fetchOnlyUnread: false,
                                      includeAttachments: false
                                  }
                              )
                          )
                        Text: ="Refresh"
                        Width: =40
                  - btn_inboxCompose_1:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(59, 130, 246, 1)
                        Icon: ="Mail"
                        OnSelect: =Set(gblShowComposePanel, true)
                        Text: ="Compose"
                        Width: =120
            - hcon_inboxBody_1:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                Children:
                  - vcon_emailListPanel_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        Width: =380
                      Children:
                        - hcon_filterChips_1:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(248, 250, 252, 1)
                              FillPortions: =0
                              Height: =48
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =8
                              PaddingLeft: =12
                              PaddingRight: =12
                            Children:
                              - btn_filterAll_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: =If(gblInboxFilter = "All", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                    BasePaletteColor: =RGBA(59, 130, 246, 1)
                                    Height: =30
                                    OnSelect: =Set(gblInboxFilter, "All")
                                    Text: ="All"
                                    Width: =60
                              - btn_filterUnread_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: =If(gblInboxFilter = "Unread", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                    BasePaletteColor: =RGBA(59, 130, 246, 1)
                                    Height: =30
                                    OnSelect: =Set(gblInboxFilter, "Unread")
                                    Text: ="Unread"
                                    Width: =72
                              - btn_filterFlagged_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: =If(gblInboxFilter = "Flagged", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                    BasePaletteColor: =RGBA(59, 130, 246, 1)
                                    Height: =30
                                    OnSelect: =Set(gblInboxFilter, "Flagged")
                                    Text: ="Flagged"
                                    Width: =78
                              - lbl_unreadCount_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
                                    FillPortions: =1
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Size: =11
                                    Text: =Text(CountIf(colInboxEmails, IsRead = false)) & " unread"
                                    VerticalAlign: =VerticalAlign.Middle
                        - rect_listTopDivider_1:
                            Control: Rectangle@2.3.0
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Fill: =RGBA(226, 232, 240, 1)
                              Height: =1
                              Width: =1
                        - lbl_emptyInbox_1:
                            Control: Text@0.0.51
                            Properties:
                              Align: ='TextCanvas.Align'.Center
                              FontColor: =RGBA(148, 163, 184, 1)
                              Text: ="No emails found."
                              VerticalAlign: =VerticalAlign.Middle
                              Visible: =CountRows(colInboxEmails) = 0
                        - gal_emailList_1:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Items: |-
                                =Filter(
                                    colInboxEmails,
                                    (gblInboxFilter = "All") Or
                                    (gblInboxFilter = "Unread" And IsRead = false) Or
                                    (gblInboxFilter = "Flagged" And Icon.Flag = "Flagged"),
                                    IsBlank(gblInboxSearch) Or
                                    (gblInboxSearch in Subject) Or
                                    (gblInboxSearch in From)
                                )
                              TemplatePadding: =0
                              TemplateSize: =80
                            Children:
                              - rec_emailRowBg_2:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =If(ThisItem.Id = gblSelectedEmail.Id, RGBA(239, 246, 255, 1), If(Not(ThisItem.IsRead), RGBA(252, 253, 255, 1), RGBA(255, 255, 255, 1)))
                                    Height: =Parent.TemplateHeight
                                    Width: =Parent.TemplateWidth
                              - rec_unreadBar_1:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =RGBA(59, 130, 246, 1)
                                    Height: =Parent.TemplateHeight
                                    Visible: =Not(ThisItem.IsRead)
                                    Width: =3
                              - lbl_emailSender_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(15, 23, 42, 1)
                                    Height: =20
                                    Size: =13
                                    Text: =ThisItem.From
                                    VerticalAlign: =VerticalAlign.Middle
                                    Weight: =If(Not(ThisItem.IsRead), 'TextCanvas.Weight'.Bold, 'TextCanvas.Weight'.Regular)
                                    Width: =220
                                    X: =14
                                    Y: =10
                              - lbl_emailReceivedDate_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Height: =20
                                    Size: =11
                                    Text: =Text(ThisItem.DateTimeReceived, "dd mmm")
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =100
                                    X: =270
                                    Y: =10
                              - lbl_emailSubject_2:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(51, 65, 85, 1)
                                    Height: =18
                                    Size: =12
                                    Text: =ThisItem.Subject
                                    Weight: =If(Not(ThisItem.IsRead), 'TextCanvas.Weight'.Semibold, 'TextCanvas.Weight'.Regular)
                                    Width: =350
                                    X: =14
                                    Y: =30
                              - lbl_emailPreview_1:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Height: =16
                                    Size: =11
                                    Text: =ThisItem.BodyPreview
                                    Width: =350
                                    X: =14
                                    Y: =50
                              - rec_emailRowDivider_1:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =RGBA(241, 245, 249, 1)
                                    Height: =1
                                    Width: =Parent.TemplateWidth
                                    Y: =Parent.TemplateHeight - 1
                              - btn_selectEmail_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: ='ButtonCanvas.Appearance'.Transparent
                                    Height: =Parent.TemplateHeight
                                    OnSelect: |-
                                      =Set(gblSelectedEmail, ThisItem);
                                      Set(gblShowReplyPanel, false);
                                      Set(gblShowPipedrivePanel, false);
                                      Set(gblLinkedDeal, Blank());
                                      If(
                                          Not(ThisItem.IsRead),
                                          Office365Outlook.MarkAsRead(ThisItem.Id);
                                          Patch(colInboxEmails, ThisItem, {IsRead: true})
                                      )
                                    Text: =""
                                    Width: =Parent.TemplateWidth
                  - rect_panelDivider_1:
                      Control: Rectangle@2.3.0
                      Properties:
                        Fill: =RGBA(226, 232, 240, 1)
                        Height: =Parent.Height
                        Width: =1
                  - vcon_emailDetailPanel_1:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =24
                        PaddingLeft: =32
                        PaddingRight: =32
                        PaddingTop: =24
                      Children:
                        - lbl_noEmailSelected_1:
                            Control: Text@0.0.51
                            Properties:
                              Align: ='TextCanvas.Align'.Center
                              FontColor: =RGBA(148, 163, 184, 1)
                              Size: =15
                              Text: ="Select an email to read it."
                              VerticalAlign: =VerticalAlign.Middle
                              Visible: =IsBlank(gblSelectedEmail)
                        - con_emailDetail_1:
                            Control: GroupContainer@1.5.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =16
                              Visible: =Not(IsBlank(gblSelectedEmail))
                            Children:
                              - hcon_detailHeader_1:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    FillPortions: =0
                                    Height: =60
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =8
                                  Children:
                                    - lbl_detailSubject_1:
                                        Control: Text@0.0.51
                                        Properties:
                                          FillPortions: =1
                                          FontColor: =RGBA(15, 23, 42, 1)
                                          Size: =18
                                          Text: =gblSelectedEmail.Subject
                                          Weight: ='TextCanvas.Weight'.Bold
                                    - btn_replyEmail_2:
                                        Control: Button@0.0.45
                                        Properties:
                                          BasePaletteColor: =RGBA(59, 130, 246, 1)
                                          Icon: ="Reply"
                                          OnSelect: =Set(gblShowReplyPanel, true)
                                          Text: ="Reply"
                                    - btn_pipedrive:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: =If(gblShowPipedrivePanel, 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                          BasePaletteColor: =RGBA(34, 111, 227, 1)
                                          Icon: ="ArrowRepeatAll"
                                          OnSelect: |-
                                            =Set(gblShowPipedrivePanel, Not(gblShowPipedrivePanel));
                                            Set(gblLinkedDeal, Blank());
                                            Set(gblPipedrivePanelMode, "create")
                                          Text: ="Pipedrive"
                                          Width: =108
                                    - btn_deleteEmail_1:
                                        Control: Button@0.0.45
                                        Properties:
                                          Appearance: ='ButtonCanvas.Appearance'.Secondary
                                          Icon: ="Delete"
                                          OnSelect: |-
                                            =Office365Outlook.DeleteEmail(gblSelectedEmail.Id);
                                            Remove(colInboxEmails, gblSelectedEmail);
                                            Set(gblSelectedEmail, First(colInboxEmails));
                                            Set(gblShowPipedrivePanel, false);
                                            Set(gblLinkedDeal, Blank())
                                          Text: ="Delete"
                              - rect_detailHeaderDivider_1:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Fill: =RGBA(226, 232, 240, 1)
                                    Height: =1
                                    Width: =1
                              - con_detailMeta_1:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(248, 250, 252, 1)
                                    FillPortions: =0
                                    Height: =80
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =6
                                    PaddingBottom: =12
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =12
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                  Children:
                                    - lbl_detailFrom_1:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(51, 65, 85, 1)
                                          Height: =20
                                          Size: =13
                                          Text: |-
                                            ="From: " & gblSelectedEmail.From
                                          Width: =Parent.Width
                                    - lbl_detailTo_1:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(51, 65, 85, 1)
                                          Height: =20
                                          Size: =13
                                          Text: |-
                                            ="To: " & gblSelectedEmail.To
                                          Width: =Parent.Width
                                    - lbl_detailDate_1:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(100, 116, 139, 1)
                                          Height: =20
                                          Size: =12
                                          Text: =Text(gblSelectedEmail.DateTimeReceived, "dd mmmm yyyy, HH:mm")
                                          Width: =Parent.Width
                              - lbl_detailBody_1:
                                  Control: ModernText@1.0.0
                                  Properties:
                                    Color: =RGBA(51, 65, 85, 1)
                                    FillPortions: =1
                                    Height: =150
                                    LayoutMinWidth: =96
                                    PaddingBottom: =0
                                    PaddingLeft: =0
                                    PaddingRight: =0
                                    PaddingTop: =0
                                    RadiusBottomLeft: =0
                                    RadiusBottomRight: =0
                                    RadiusTopLeft: =0
                                    RadiusTopRight: =0
                                    Size: =13
                                    Text: =gblSelectedEmail.BodyPreview
                                    VerticalAlign: =VerticalAlign.Top
                                    Width: =Parent.Width
                              - con_replyPanel_1:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(248, 250, 252, 1)
                                    FillPortions: =0
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =8
                                    PaddingBottom: =12
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =12
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Visible: =gblShowReplyPanel And Not(IsBlank(gblSelectedEmail))
                                  Children:
                                    - lbl_replyLabel_1:
                                        Control: Text@0.0.51
                                        Properties:
                                          FontColor: =RGBA(100, 116, 139, 1)
                                          Height: =18
                                          Size: =11
                                          Text: ="REPLY"
                                          Weight: ='TextCanvas.Weight'.Bold
                                    - txt_replyBody_2:
                                        Control: Classic/TextInput@2.3.2
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Height: =120
                                          HintText: ="Write your reply…"
                                          Mode: =TextMode.MultiLine
                                    - hcon_replyActions_2:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          FillPortions: =0
                                          Height: =36
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          LayoutJustifyContent: =LayoutJustifyContent.End
                                        Children:
                                          - btn_cancelReply_2:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                OnSelect: |-
                                                  =Set(gblShowReplyPanel, false);
                                                  Reset(txt_replyBody_2)
                                                Text: ="Cancel"
                                                Width: =80
                                          - btn_sendReply_2:
                                              Control: Button@0.0.45
                                              Properties:
                                                BasePaletteColor: =RGBA(59, 130, 246, 1)
                                                OnSelect: |-
                                                  =If(
                                                      IsBlank(txt_replyBody_2.Text),
                                                      Notify("Reply cannot be empty.", NotificationType.Warning),
                                                      Office365Outlook.ReplyToV3(
                                                          gblSelectedEmail.Id,
                                                          {Comment: txt_replyBody_2.Text}
                                                      );
                                                      Notify("Reply sent.", NotificationType.Success);
                                                      Set(gblShowReplyPanel, false);
                                                      Reset(txt_replyBody_2)
                                                  )
                                                Text: ="Send"
                                                Width: =80
                              - con_pipedrivePanel:
                                  Control: GroupContainer@1.5.0
                                  Variant: AutoLayout
                                  Properties:
                                    DropShadow: =DropShadow.None
                                    Fill: =RGBA(240, 249, 255, 1)
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutGap: =10
                                    LayoutMinHeight: =280
                                    PaddingBottom: =16
                                    PaddingLeft: =16
                                    PaddingRight: =16
                                    PaddingTop: =12
                                    RadiusBottomLeft: =8
                                    RadiusBottomRight: =8
                                    RadiusTopLeft: =8
                                    RadiusTopRight: =8
                                    Visible: =gblShowPipedrivePanel And Not(IsBlank(gblSelectedEmail))
                                  Children:
                                    - hcon_pdHeader:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          Height: =32
                                          LayoutAlignItems: =LayoutAlignItems.Center
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          LayoutGap: =8
                                          LayoutMaxHeight: =30
                                          LayoutMinHeight: =0
                                        Children:
                                          - lbl_pdPanelTitle:
                                              Control: Text@0.0.51
                                              Properties:
                                                FontColor: =RGBA(30, 58, 138, 1)
                                                Height: =20
                                                Size: =11
                                                Text: ="PIPEDRIVE"
                                                VerticalAlign: =VerticalAlign.Middle
                                                Weight: ='TextCanvas.Weight'.Bold
                                          - btn_pdModeCreate:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: =If(gblPipedrivePanelMode = "create", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                                BasePaletteColor: =RGBA(59, 130, 246, 1)
                                                Height: =28
                                                OnSelect: |-
                                                  =Set(gblPipedrivePanelMode, "create");
                                                  Set(gblLinkedDeal, Blank())
                                                Text: ="Create Deal"
                                                Width: =100
                                          - btn_pdModeUpdate:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: =If(gblPipedrivePanelMode = "update", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                                BasePaletteColor: =RGBA(59, 130, 246, 1)
                                                Height: =28
                                                OnSelect: |-
                                                  =Set(gblPipedrivePanelMode, "update");
                                                  Set(gblLinkedDeal, Blank())
                                                Text: ="Update Deal"
                                                Width: =104
                                          - lbl_pdHeaderSpacer:
                                              Control: Text@0.0.51
                                              Properties:
                                                FillPortions: =1
                                                Text: =""
                                          - btn_pdClose:
                                              Control: Button@0.0.45
                                              Properties:
                                                Appearance: ='ButtonCanvas.Appearance'.Transparent
                                                Height: =28
                                                Icon: ="Dismiss"
                                                Layout: ='ButtonCanvas.Layout'.IconOnly
                                                OnSelect: =Set(gblShowPipedrivePanel, false)
                                                Text: ="Close"
                                                Width: =32
                                    - rect_pdDivider:
                                        Control: Rectangle@2.3.0
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Stretch
                                          Fill: =RGBA(186, 230, 253, 1)
                                          Height: =1
                                          Width: =1
                                    - con_pdCreate:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =8
                                          LayoutMinHeight: =0
                                          Visible: =gblPipedrivePanelMode = "create"
                                        Children:
                                          - lbl_pdCreateDealTitle:
                                              Control: Text@0.0.51
                                              Properties:
                                                FontColor: =RGBA(100, 116, 139, 1)
                                                Height: =16
                                                Size: =10
                                                Text: ="Deal Title"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - txt_pdDealTitle:
                                              Control: Classic/TextInput@2.3.2
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Default: =gblSelectedEmail.Subject
                                                Height: =20
                                                HintText: ="Deal title…"
                                          - lbl_pdCreateValueLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                FontColor: =RGBA(100, 116, 139, 1)
                                                Height: =16
                                                Size: =10
                                                Text: ="Deal Value (£)"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - txt_pdDealValue:
                                              Control: Classic/TextInput@2.3.2
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Default: ="0"
                                                Height: =20
                                                HintText: ="0"
                                          - lbl_pdCreateStageLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                FontColor: =RGBA(100, 116, 139, 1)
                                                Height: =16
                                                Size: =10
                                                Text: ="Stage"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - drp_pdCreateStage:
                                              Control: Classic/DropDown@2.3.1
                                              Properties:
                                                AlignInContainer: =AlignInContainer.Stretch
                                                Height: =20
                                                Items: =colPipelineStages
                                                Items.Value: =name
                                          - hcon_pdCreateActions:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                FillPortions: =0
                                                Height: =30
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =8
                                                LayoutJustifyContent: =LayoutJustifyContent.End
                                              Children:
                                                - btn_pdCancelCreate:
                                                    Control: Button@0.0.45
                                                    Properties:
                                                      Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                      OnSelect: =Set(gblShowPipedrivePanel, false)
                                                      Text: ="Cancel"
                                                      Width: =80
                                                - btn_pdCreateDeal:
                                                    Control: Button@0.0.45
                                                    Properties:
                                                      BasePaletteColor: =RGBA(59, 130, 246, 1)
                                                      OnSelect: |-
                                                        =If(
                                                            IsBlank(txt_pdDealTitle.Text),
                                                            Notify("Deal title is required.", NotificationType.Warning),
                                                        Pipedrive.AddDealV2(
                                                            txt_pdDealTitle.Text,
                                                            {
                                                                stage_id: Text(drp_pdCreateStage.Selected.id),
                                                                value:    Value(txt_pdDealValue.Text),
                                                                currency: "GBP"
                                                            }
                                                        );
                                                        Notify("Deal created: " & txt_pdDealTitle.Text, NotificationType.Success);
                                                        Set(gblShowPipedrivePanel, false);
                                                        Reset(txt_pdDealTitle);
                                                        Reset(txt_pdDealValue)
                                                        )
                                                      Text: ="Create Deal"
                                                      Width: =108
                                    - con_pdUpdate:
                                        Control: GroupContainer@1.5.0
                                        Variant: AutoLayout
                                        Properties:
                                          DropShadow: =DropShadow.None
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =8
                                          LayoutMinHeight: =0
                                          Visible: =gblPipedrivePanelMode = "update"
                                        Children:
                                          - lbl_pdDealIdLabel:
                                              Control: Text@0.0.51
                                              Properties:
                                                FontColor: =RGBA(100, 116, 139, 1)
                                                Height: =16
                                                Size: =10
                                                Text: ="Pipedrive Deal ID"
                                                Weight: ='TextCanvas.Weight'.Semibold
                                          - hcon_pdFetchRow:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                FillPortions: =0
                                                Height: =40
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =8
                                              Children:
                                                - txt_pdDealId:
                                                    Control: Classic/TextInput@2.3.2
                                                    Properties:
                                                      FillPortions: =1
                                                      HintText: ="e.g. 12345"
                                                - btn_pdFetchDeal:
                                                    Control: Button@0.0.45
                                                    Properties:
                                                      Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                      OnSelect: |-
                                                        =If(
                                                            IsBlank(txt_pdDealId.Text),
                                                            Notify("Enter a Deal ID.", NotificationType.Warning),
                                                            Set(
                                                                gblLinkedDeal,
                                                                Pipedrive.GetDeal(Value(txt_pdDealId.Text))
                                                            );
                                                            If(
                                                                IsBlank(gblLinkedDeal),
                                                                Notify("Deal not found. Check the ID and try again.", NotificationType.Error)
                                                            )
                                                        )
                                                      Text: ="Fetch"
                                                      Width: =64
                                          - con_pdLinkedDealInfo:
                                              Control: GroupContainer@1.5.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                Fill: =RGBA(255, 255, 255, 1)
                                                LayoutDirection: =LayoutDirection.Vertical
                                                LayoutGap: =6
                                                PaddingBottom: =10
                                                PaddingLeft: =12
                                                PaddingRight: =12
                                                PaddingTop: =10
                                                RadiusBottomLeft: =6
                                                RadiusBottomRight: =6
                                                RadiusTopLeft: =6
                                                RadiusTopRight: =6
                                                Visible: =Not(IsBlank(gblLinkedDeal))
                                              Children:
                                                - lbl_pdLinkedTitle:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      FontColor: =RGBA(15, 23, 42, 1)
                                                      Height: =20
                                                      Size: =13
                                                      Text: =gblLinkedDeal.title
                                                      Weight: ='TextCanvas.Weight'.Semibold
                                                - lbl_pdLinkedMeta:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      FontColor: =RGBA(100, 116, 139, 1)
                                                      Height: =16
                                                      Size: =11
                                                      Text: |-
                                                        ="Stage: " & Coalesce(LookUp(colPipelineStages, id = gblLinkedDeal.stage_id, name), "Unknown") & "  ·  £" & Text(gblLinkedDeal.value, "[$-en-GB]#,##0")
                                                - lbl_pdNewStageLabel:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      FontColor: =RGBA(100, 116, 139, 1)
                                                      Height: =16
                                                      Size: =10
                                                      Text: ="Move to Stage"
                                                      Weight: ='TextCanvas.Weight'.Semibold
                                                - drp_pdUpdateStage:
                                                    Control: Classic/DropDown@2.3.1
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      Items: =colPipelineStages
                                                      Items.Value: =name
                                                - hcon_pdUpdateActions:
                                                    Control: GroupContainer@1.5.0
                                                    Variant: AutoLayout
                                                    Properties:
                                                      DropShadow: =DropShadow.None
                                                      FillPortions: =0
                                                      Height: =36
                                                      LayoutAlignItems: =LayoutAlignItems.Center
                                                      LayoutDirection: =LayoutDirection.Horizontal
                                                      LayoutGap: =8
                                                      LayoutJustifyContent: =LayoutJustifyContent.End
                                                    Children:
                                                      - btn_pdLogActivity:
                                                          Control: Button@0.0.45
                                                          Properties:
                                                            Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                            OnSelect: |-
                                                              =Pipedrive.AddActivity(
                                                                  "email",
                                                                  gblSelectedEmail.Subject,
                                                                  {
                                                                      deal_id:  gblLinkedDeal.id,
                                                                      note:     gblSelectedEmail.BodyPreview,
                                                                      due_date: Text(Today(), "yyyy-mm-dd")
                                                                  }
                                                              );
                                                              Notify("Email logged as activity on deal.", NotificationType.Success)
                                                            Text: ="Log Email"
                                                      - btn_pdUpdateStage:
                                                          Control: Button@0.0.45
                                                          Properties:
                                                            BasePaletteColor: =RGBA(59, 130, 246, 1)
                                                            OnSelect: |-
                                                              =Pipedrive.UpdateDealStageV2(
                                                                  gblLinkedDeal.id,
                                                                  Text(gblLinkedDeal.pipeline_id),
                                                                  Text(drp_pdUpdateStage.Selected.id)
                                                              );
                                                              Notify(
                                                                  "Stage updated to " & drp_pdUpdateStage.Selected.name,
                                                                  NotificationType.Success
                                                              );
                                                              Set(gblShowPipedrivePanel, false);
                                                              Set(gblLinkedDeal, Blank())
                                                            Text: ="Update Stage"
                                                            Width: =112
