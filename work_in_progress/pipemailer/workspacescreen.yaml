Screens:
  scr_WorkspaceView:
    Properties:
      Fill: =RGBA(242, 244, 248, 1)
      OnVisible: |+
        =UpdateContext({ctxActiveTab: "Thread"});
        If(
            IsBlank(gblCurrentView),
            Set(gblCurrentView, "email");
            Set(gblThemeMode, "light");
            Set(gblActorName, User().FullName);
            Set(gblCurrentUserId, LookUp(Assignees, email = User().Email, id));
            Set(gblSelectedFolder, "inbox");
            Set(gblSelectedQueue, "all");
            Set(gblSelectedAssigneeFilter, "all");
            Set(gblSearchText, "");
            Set(gblShowReplyComposer, false);
            Set(gblShowComposePopup, false);
            Set(gblShowDealPopup, false);
            Set(gblToastVisible, false);
            Set(gblToastMessage, "")
        );
        ClearCollect(colAssignees, Assignees);
        ClearCollect(colMacroTemplates, Filter(MacroTemplates, isArchived = false));
        ClearCollect(
            colPipelineStages,
            ForAll(
                PipelineStages As stage,
                {
                    id: Coalesce(stage.id, stage.stage_id, stage.Id),
                    name: Coalesce(stage.name, stage.stage_name, stage.Value),
                    pipeline_name: Coalesce(stage.pipeline_name, stage.pipeline, stage.pipelineName)
                }
            )
        );
        ClearCollect(
            colWorkspaceEmailsRaw,
            Office365Outlook.GetEmails(
                {
                    folderPath: Switch(
                        Lower(gblSelectedFolder),
                        "sent", "Sent Items",
                        "drafts", "Drafts",
                        "archive", "Archive",
                        "Inbox"
                    ),
                    top: 50,
                    fetchOnlyUnread: false,
                    includeAttachments: false
                }
            )
        );
        ClearCollect(
            colWorkspaceEmails,
            ForAll(
                colWorkspaceEmailsRaw As email,
                With(
                    {
                        normalizedId: Text(Coalesce(email.Id, email.id, email.messageId)),
                        normalizedFrom: Coalesce(email.From, email.from, email.Sender, email.sender),
                        normalizedSubject: Coalesce(email.Subject, email.subject),
                        normalizedBodyPreview: Coalesce(email.BodyPreview, email.bodyPreview),
                        normalizedReceivedAt: Coalesce(email.DateTimeReceived, email.receivedDateTime, email.receivedAt),
                        normalizedIsRead: Coalesce(email.IsRead, email.isRead, false),
                        normalizedTo: Coalesce(email.To, email.to)
                    },
                    {
                        Id: normalizedId,
                        id: normalizedId,
                        From: normalizedFrom,
                        from: normalizedFrom,
                        Subject: normalizedSubject,
                        subject: normalizedSubject,
                        BodyPreview: normalizedBodyPreview,
                        bodyPreview: normalizedBodyPreview,
                        snippet: normalizedBodyPreview,
                        DateTimeReceived: normalizedReceivedAt,
                        receivedAt: normalizedReceivedAt,
                        IsRead: normalizedIsRead,
                        isRead: normalizedIsRead,
                        To: normalizedTo,
                        to: normalizedTo,
                        relativeDate: If(
                            IsBlank(normalizedReceivedAt),
                            "",
                            With(
                                {ageMins: DateDiff(normalizedReceivedAt, Now(), TimeUnit.Minutes)},
                                If(
                                    ageMins < 60,
                                    Text(ageMins) & "m ago",
                                    If(
                                        ageMins < 1440,
                                        Text(RoundDown(ageMins / 60, 0)) & "h ago",
                                        Text(normalizedReceivedAt, "dd mmm")
                                    )
                                )
                            )
                        ),
                        assigneeId: Blank(),
                        dealId: Blank(),
                        approvalStatus: Blank(),
                        computedSlaStatus: Blank(),
                        resolutionDueAt: Blank(),
                        assignedAt: Blank()
                    }
                )
            )
        );
        ClearCollect(
            colEmails,
            SortByColumns(colWorkspaceEmails, "DateTimeReceived", SortOrder.Descending)
        );
        UpdateContext({ctxHasAssignmentFields: CountIf(colEmails, Not(IsBlank(assigneeId))) > 0});
        ClearCollect(colDeals, Deals);
        ClearCollect(colAssigneeFilters, Table({id: "all", name: "All assignees"}));
        Collect(colAssigneeFilters, colAssignees);
        If(
            Not(IsBlank(gblSelectedEmail)),
            Set(gblSelectedEmailId, Coalesce(gblSelectedEmail.id, gblSelectedEmail.Id, gblSelectedEmailId));
            Set(gblSelectedDealId, Coalesce(gblSelectedEmail.dealId, gblSelectedDealId)),
            If(
                Not(IsBlank(gblKanbanSelectedCard)),
                Set(gblSelectedDealId, Coalesce(gblKanbanSelectedCard.id, gblSelectedDealId))
            )
        );
        If(
            IsBlank(Coalesce(gblSelectedEmailId, gblSelectedEmail.Id, gblSelectedEmail.id)) And Not(IsBlank(First(colEmails))),
            Set(gblSelectedEmailId, Coalesce(First(colEmails).Id, First(colEmails).id));
            Set(gblSelectedDealId, Coalesce(First(colEmails).DealId, First(colEmails).dealId));
            Set(
                gblSelectedEmail,
                With(
                    {selEmail: First(colEmails)},
                    {
                        Id: Coalesce(selEmail.Id, selEmail.id),
                        Subject: Coalesce(selEmail.Subject, selEmail.subject),
                        BodyPreview: Coalesce(selEmail.BodyPreview, selEmail.bodyPreview, selEmail.snippet),
                        From: Coalesce(selEmail.From, selEmail.from),
                        To: Coalesce(selEmail.To, selEmail.to),
                        DateTimeReceived: Coalesce(selEmail.DateTimeReceived, selEmail.receivedAt),
                        IsRead: Coalesce(selEmail.IsRead, selEmail.isRead),
                        DealId: Coalesce(selEmail.DealId, selEmail.dealId),
                        AssigneeId: Coalesce(selEmail.AssigneeId, selEmail.assigneeId),
                        ApprovalStatus: Coalesce(selEmail.ApprovalStatus, selEmail.approvalStatus)
                    }
                )
            )
        );
        If(
            Not(IsBlank(Coalesce(gblSelectedEmailId, gblSelectedEmail.Id, gblSelectedEmail.id))),
            ClearCollect(
                colCurrentThread,
                With(
                    {
                        selectedThreadEmailId: Coalesce(gblSelectedEmail.Id, gblSelectedEmail.id, gblSelectedEmailId),
                        selectedThreadInternetMessageId: Coalesce(
                            gblSelectedEmail.InternetMessageId,
                            gblSelectedEmail.internetMessageId,
                            gblSelectedEmail.MessageId,
                            gblSelectedEmail.messageId
                        )
                    },
                    Filter(
                        EmailMessages,
                        emailId = selectedThreadEmailId Or
                        emailId = selectedThreadInternetMessageId
                    )
                )
            )
        );

    Children:
      - vcon_appShell:
          Control: GroupContainer@1.5.0
          Variant: AutoLayout
          Properties:
            DropShadow: =DropShadow.None
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            Width: =Parent.Width
          Children:
            - hcon_topBar:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(15, 23, 42, 1)
                  FillPortions: =0
                  Height: =56
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =8
                  PaddingLeft: =16
                  PaddingRight: =16
                Children:
                  - lbl_logo:
                      Control: Text@0.0.51
                      Properties:
                        FontColor: =RGBA(255, 255, 255, 1)
                        Size: =18
                        Text: ="PipeMailer"
                        VerticalAlign: =VerticalAlign.Middle
                        Weight: ='TextCanvas.Weight'.Bold
                        Width: =130
                  - txt_search:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        BorderColor: =RGBA(71, 85, 105, 1)
                        Default: =gblSearchText
                        Fill: =RGBA(30, 41, 59, 1)
                        HintText: ="Search emails, deals, RMA…"
                        HoverBorderColor: =RGBA(147, 197, 253, 1)
                        OnChange: =Set(gblSearchText, Self.Text)
                        Width: =300
                  - btn_viewEmail:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: =If(gblCurrentView = "email", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                        OnSelect: |-
                          =Set(gblCurrentView, "email");
                          Set(gblSelectedEmail, LookUp(colEmails, id = Coalesce(gblSelectedEmailId, gblSelectedEmail.Id, gblSelectedEmail.id)));
                          Navigate(scr_Inbox, ScreenTransition.None)
                        Text: ="Email View"
                        Width: =104
                  - btn_viewPipeline:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: =If(gblCurrentView = "pipeline", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                        OnSelect: |-
                          =Set(gblCurrentView, "pipeline");
                          Set(gblKanbanSelectedCard, LookUp(colDeals, id = gblSelectedDealId));
                          Set(gblKanbanPipeline, Coalesce(gblKanbanPipeline, "Customer returns"));
                          Navigate(scr_ReturnsKanban, ScreenTransition.None)
                        Text: ="Pipeline View"
                        Width: =116
                  - btn_viewDashboard:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: =If(gblCurrentView = "dashboard", 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                        OnSelect: =Set(gblCurrentView, "dashboard")
                        Text: ="Dashboard"
                        Width: =108
                  - btn_compose:
                      Control: Button@0.0.45
                      Properties:
                        BasePaletteColor: =RGBA(59, 130, 246, 1)
                        OnSelect: =Set(gblShowComposePopup, true)
                        Text: ="+ Add Email"
                        Width: =108
                  - btn_createDeal:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        OnSelect: =Set(gblShowDealPopup, true)
                        Text: ="Add Deal / Return"
                        Width: =148
                  - btn_toggleTheme:
                      Control: Button@0.0.45
                      Properties:
                        Appearance: ='ButtonCanvas.Appearance'.Secondary
                        OnSelect: =Set(gblThemeMode, If(gblThemeMode = "light", "dark", "light"))
                        Text: =If(gblThemeMode = "light", "Dark", "Light")
                        Width: =72
            - hcon_body:
                Control: GroupContainer@1.5.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.None
                  LayoutDirection: =LayoutDirection.Horizontal
                Children:
                  - vcon_sidebar:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(248, 250, 252, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        PaddingBottom: =12
                        PaddingTop: =12
                        Width: =200
                      Children:
                        - lbl_navHeading:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: =RGBA(148, 163, 184, 1)
                              Height: =28
                              PaddingLeft: =12
                              Size: =10
                              Text: ="NAVIGATION"
                              VerticalAlign: =VerticalAlign.Middle
                              Weight: ='TextCanvas.Weight'.Bold
                        - gal_folders:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              FillPortions: =0
                              Height: =152
                              Items: |-
                                =Table({id: "inbox", label: "Inbox"}, {id: "sent", label: "Sent"}, {id: "drafts", label: "Drafts"}, {id: "archive", label: "Archive"})
                              TemplatePadding: =0
                              TemplateSize: =38
                            Children:
                              - rec_folderBg:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =If(ThisItem.id = gblSelectedFolder, RGBA(219, 234, 254, 1), RGBA(0, 0, 0, 0))
                                    Height: =Parent.TemplateHeight
                                    OnSelect: |-
                                      =Set(gblSelectedFolder, ThisItem.id);
                                      ClearCollect(
                                          colWorkspaceEmailsRaw,
                                          Office365Outlook.GetEmails(
                                              {
                                                  folderPath: Switch(
                                                      Lower(gblSelectedFolder),
                                                      "sent", "Sent Items",
                                                      "drafts", "Drafts",
                                                      "archive", "Archive",
                                                      "Inbox"
                                                  ),
                                                  top: 50,
                                                  fetchOnlyUnread: false,
                                                  includeAttachments: false
                                              }
                                          )
                                      );
                                      ClearCollect(
                                          colWorkspaceEmails,
                                          ForAll(
                                              colWorkspaceEmailsRaw As email,
                                              With(
                                                  {
                                                      normalizedId: Text(Coalesce(email.Id, email.id, email.messageId)),
                                                      normalizedFrom: Coalesce(email.From, email.from, email.Sender, email.sender),
                                                      normalizedSubject: Coalesce(email.Subject, email.subject),
                                                      normalizedBodyPreview: Coalesce(email.BodyPreview, email.bodyPreview),
                                                      normalizedReceivedAt: Coalesce(email.DateTimeReceived, email.receivedDateTime, email.receivedAt),
                                                      normalizedIsRead: Coalesce(email.IsRead, email.isRead, false),
                                                      normalizedTo: Coalesce(email.To, email.to)
                                                  },
                                                  {
                                                      Id: normalizedId,
                                                      id: normalizedId,
                                                      From: normalizedFrom,
                                                      from: normalizedFrom,
                                                      Subject: normalizedSubject,
                                                      subject: normalizedSubject,
                                                      BodyPreview: normalizedBodyPreview,
                                                      bodyPreview: normalizedBodyPreview,
                                                      snippet: normalizedBodyPreview,
                                                      DateTimeReceived: normalizedReceivedAt,
                                                      receivedAt: normalizedReceivedAt,
                                                      IsRead: normalizedIsRead,
                                                      isRead: normalizedIsRead,
                                                      To: normalizedTo,
                                                      to: normalizedTo,
                                                      relativeDate: If(
                                                          IsBlank(normalizedReceivedAt),
                                                          "",
                                                          With(
                                                              {ageMins: DateDiff(normalizedReceivedAt, Now(), TimeUnit.Minutes)},
                                                              If(
                                                                  ageMins < 60,
                                                                  Text(ageMins) & "m ago",
                                                                  If(
                                                                      ageMins < 1440,
                                                                      Text(RoundDown(ageMins / 60, 0)) & "h ago",
                                                                      Text(normalizedReceivedAt, "dd mmm")
                                                                  )
                                                              )
                                                          )
                                                      ),
                                                      assigneeId: Blank(),
                                                      dealId: Blank(),
                                                      approvalStatus: Blank(),
                                                      computedSlaStatus: Blank(),
                                                      resolutionDueAt: Blank(),
                                                      assignedAt: Blank()
                                                  }
                                              )
                                          )
                                      );
                                      ClearCollect(
                                          colEmails,
                                          SortByColumns(colWorkspaceEmails, "DateTimeReceived", SortOrder.Descending)
                                      );
                                      UpdateContext({ctxHasAssignmentFields: CountIf(colEmails, Not(IsBlank(assigneeId))) > 0})
                                    Width: =Parent.TemplateWidth
                              - lbl_folderLabel:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =If(ThisItem.id = gblSelectedFolder, RGBA(29, 78, 216, 1), RGBA(51, 65, 85, 1))
                                    Height: =Parent.TemplateHeight
                                    PaddingLeft: =12
                                    Size: =13
                                    Text: =ThisItem.label
                                    VerticalAlign: =VerticalAlign.Middle
                                    Weight: =If(ThisItem.id = gblSelectedFolder, 'TextCanvas.Weight'.Semibold, 'TextCanvas.Weight'.Regular)
                                    Width: =148
                              - lbl_folderCount:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Height: =Parent.TemplateHeight
                                    Size: =11
                                    Text: =Text(CountIf(Emails, folder = ThisItem.id))
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =34
                                    X: =160
                        - rect_sidebarDiv1:
                            Control: Rectangle@2.3.0
                            Properties:
                              Fill: =RGBA(226, 232, 240, 1)
                              Height: =1
                              Width: =176
                              X: =12
                        - lbl_queuesHeading:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: =RGBA(148, 163, 184, 1)
                              Height: =28
                              PaddingLeft: =12
                              Size: =10
                              Text: ="QUEUES"
                              VerticalAlign: =VerticalAlign.Middle
                              Weight: ='TextCanvas.Weight'.Bold
                        - gal_queues:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              FillPortions: =0
                              Height: =152
                              Items: |-
                                =Table({id: "all", label: "All"}, {id: "unassigned", label: "Unassigned"}, {id: "mine", label: "Mine"}, {id: "team", label: "Team"})
                              TemplatePadding: =0
                              TemplateSize: =38
                            Children:
                              - rec_queueBg:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =If(ThisItem.id = gblSelectedQueue, RGBA(219, 234, 254, 1), RGBA(0, 0, 0, 0))
                                    Height: =Parent.TemplateHeight
                                    OnSelect: |-
                                      =Set(gblSelectedQueue, ThisItem.id);
                                      ClearCollect(
                                          colEmails,
                                          SortByColumns(
                                              Filter(
                                                  Emails,
                                                  folder = gblSelectedFolder,
                                                  (gblSelectedQueue = "all") Or
                                                  (gblSelectedQueue = "mine" And assigneeId = gblCurrentUserId) Or
                                                  (gblSelectedQueue = "unassigned" And IsBlank(assigneeId)) Or
                                                  (gblSelectedQueue = "team" And Not(IsBlank(assigneeId)))
                                              ),
                                              "receivedAt", SortOrder.Descending
                                          )
                                      )
                                    Width: =Parent.TemplateWidth
                              - lbl_queueLabel:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =If(ThisItem.id = gblSelectedQueue, RGBA(29, 78, 216, 1), RGBA(51, 65, 85, 1))
                                    Height: =Parent.TemplateHeight
                                    PaddingLeft: =12
                                    Size: =13
                                    Text: =ThisItem.label
                                    VerticalAlign: =VerticalAlign.Middle
                                    Weight: =If(ThisItem.id = gblSelectedQueue, 'TextCanvas.Weight'.Semibold, 'TextCanvas.Weight'.Regular)
                                    Width: =148
                        - rect_sidebarDiv2:
                            Control: Rectangle@2.3.0
                            Properties:
                              Fill: =RGBA(226, 232, 240, 1)
                              Height: =1
                              Width: =176
                              X: =12
                        - lbl_stagesHeading:
                            Control: Text@0.0.51
                            Properties:
                              FontColor: =RGBA(148, 163, 184, 1)
                              Height: =28
                              PaddingLeft: =12
                              Size: =10
                              Text: ="PIPELINE STAGES"
                              VerticalAlign: =VerticalAlign.Middle
                              Weight: ='TextCanvas.Weight'.Bold
                        - gal_pipelineStages:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Items: =colPipelineStages
                              TemplatePadding: =0
                              TemplateSize: =34
                            Children:
                              - lbl_stageLink:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(59, 130, 246, 1)
                                    Height: =Parent.TemplateHeight
                                    PaddingLeft: =12
                                    Size: =13
                                    Text: =ThisItem.name
                                    VerticalAlign: =VerticalAlign.Middle
                  - vcon_emailList:
                      Control: GroupContainer@1.5.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        LayoutDirection: =LayoutDirection.Vertical
                        Width: =360
                      Children:
                        - gal_assigneeFilters:
                            Control: Gallery@2.15.0
                            Variant: Horizontal
                            Properties:
                              FillPortions: =0
                              Height: =44
                              Items: =colAssigneeFilters
                              TemplatePadding: =6
                              TemplateSize: =110
                            Children:
                              - btn_assigneeChip:
                                  Control: Button@0.0.45
                                  Properties:
                                    Appearance: =If(gblSelectedAssigneeFilter = ThisItem.id, 'ButtonCanvas.Appearance'.Primary, 'ButtonCanvas.Appearance'.Secondary)
                                    BasePaletteColor: =RGBA(59, 130, 246, 1)
                                    Height: =28
                                    OnSelect: =Set(gblSelectedAssigneeFilter, ThisItem.id)
                                    Text: =ThisItem.name
                                    Width: =98
                        - rect_listDivider:
                            Control: Rectangle@2.3.0
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              Fill: =RGBA(226, 232, 240, 1)
                              Height: =1
                              Width: =1
                        - gal_emails:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              Items: |-
                                =Sort(
                                    Filter(
                                        colEmails,
                                        Not(ctxHasAssignmentFields) Or
                                        (gblSelectedQueue = "all") Or
                                        (gblSelectedQueue = "mine" And assigneeId = gblCurrentUserId) Or
                                        (gblSelectedQueue = "unassigned" And IsBlank(assigneeId)) Or
                                        (gblSelectedQueue = "team" And Not(IsBlank(assigneeId))),
                                        Not(ctxHasAssignmentFields) Or (gblSelectedAssigneeFilter = "all") Or assigneeId = gblSelectedAssigneeFilter,
                                        IsBlank(gblSearchText) Or (gblSearchText in Coalesce(subject, Subject)) Or (gblSearchText in Coalesce(from, From))
                                    ),
                                    receivedAt, SortOrder.Descending
                                )
                              OnSelect: |-
                                =With(
                                    {
                                        selectedEmailId: Text(Coalesce(ThisItem.Id, ThisItem.id)),
                                        selectedInternetMessageId: Text(Coalesce(ThisItem.InternetMessageId, ThisItem.internetMessageId, ThisItem.MessageId, ThisItem.messageId)),
                                        selectedEmailRecord: {
                                            Id: Text(Coalesce(ThisItem.Id, ThisItem.id)),
                                            Subject: Coalesce(ThisItem.Subject, ThisItem.subject),
                                            BodyPreview: Coalesce(ThisItem.BodyPreview, ThisItem.bodyPreview, ThisItem.snippet),
                                            From: Coalesce(ThisItem.From, ThisItem.from),
                                            To: Coalesce(ThisItem.To, ThisItem.to),
                                            DateTimeReceived: Coalesce(ThisItem.DateTimeReceived, ThisItem.receivedAt),
                                            IsRead: true,
                                            DealId: Coalesce(ThisItem.DealId, ThisItem.dealId),
                                            AssigneeId: Coalesce(ThisItem.AssigneeId, ThisItem.assigneeId),
                                            ApprovalStatus: Coalesce(ThisItem.ApprovalStatus, ThisItem.approvalStatus),
                                            InternetMessageId: Text(Coalesce(ThisItem.InternetMessageId, ThisItem.internetMessageId, ThisItem.MessageId, ThisItem.messageId))
                                        }
                                    },
                                    Set(gblSelectedEmail, selectedEmailRecord);
                                    Set(gblSelectedEmailId, selectedEmailId);
                                    Set(gblSelectedDealId, Coalesce(selectedEmailRecord.DealId, ThisItem.dealId));
                                    Patch(
                                        colEmails,
                                        LookUp(colEmails, Coalesce(Id, id) = selectedEmailId),
                                        {IsRead: true, isRead: true}
                                    );
                                    Set(gblShowReplyComposer, false);
                                    ClearCollect(
                                        colCurrentThread,
                                        With(
                                            {
                                                selectedThreadEmailId: Coalesce(
                                                    selectedEmailRecord.Id,
                                                    selectedEmailRecord.id,
                                                    selectedEmailId
                                                ),
                                                selectedThreadInternetMessageId: Coalesce(
                                                    selectedEmailRecord.InternetMessageId,
                                                    selectedEmailRecord.internetMessageId,
                                                    selectedInternetMessageId
                                                )
                                            },
                                            Filter(
                                                EmailMessages,
                                                emailId = selectedThreadEmailId Or
                                                emailId = selectedThreadInternetMessageId
                                            )
                                        )
                                    );
                                    UpdateContext({ctxActiveTab: "Thread"})
                                )
                              TemplatePadding: =0
                              TemplateSize: =94
                            Children:
                              - rec_emailRowBg:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =If(ThisItem.Id = gblSelectedEmailId, RGBA(239, 246, 255, 1), If(ThisItem.computedSlaStatus = "overdue" Or ThisItem.computedSlaStatus = "breached", RGBA(255, 241, 242, 1), RGBA(255, 255, 255, 1)))
                                    Height: =Parent.TemplateHeight
                                    Width: =Parent.TemplateWidth
                              - rec_unreadDot:
                                  Control: Rectangle@2.3.0
                                  Properties:
                                    Fill: =RGBA(59, 130, 246, 1)
                                    Height: =6
                                    Visible: =Not(ThisItem.isRead)
                                    Width: =6
                                    X: =8
                                    Y: =20
                              - lbl_emailFrom:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(15, 23, 42, 1)
                                    Height: =20
                                    Size: =13
                                    Text: =ThisItem.from
                                    VerticalAlign: =VerticalAlign.Middle
                                    Weight: =If(Not(ThisItem.isRead), 'TextCanvas.Weight'.Bold, 'TextCanvas.Weight'.Normal)
                                    Width: =216
                                    X: =22
                                    Y: =8
                              - lbl_emailDate:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.End
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Height: =20
                                    Size: =11
                                    Text: =ThisItem.relativeDate
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =108
                                    X: =244
                                    Y: =8
                              - lbl_emailSubject:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(51, 65, 85, 1)
                                    Height: =18
                                    Size: =12
                                    Text: =ThisItem.subject
                                    Weight: =If(Not(ThisItem.isRead), 'TextCanvas.Weight'.Semibold, 'TextCanvas.Weight'.Normal)
                                    Width: =330
                                    X: =22
                                    Y: =28
                              - lbl_emailSnippet:
                                  Control: Text@0.0.51
                                  Properties:
                                    FontColor: =RGBA(148, 163, 184, 1)
                                    Height: =16
                                    Size: =11
                                    Text: =ThisItem.snippet
                                    Width: =330
                                    X: =22
                                    Y: =46
