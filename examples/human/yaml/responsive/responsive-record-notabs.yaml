  scrPO_Detail:
    Properties:
      Fill: =varTheme.Main.BackgroundColor
      OnVisible: |
        =// scrPO -> Properties -> OnVisible
        /*UpdateContext({
            lvar_selectedPO: If(IsBlankOrError(lvar_selectedPO), {}, lvar_selectedPO),
            lrec_selectedFund: If(IsBlankOrError(lrec_selectedFund), {}, lrec_selectedFund),
            lrec_selectedJob: If(IsBlankOrError(lrec_selectedJob), {}, lrec_selectedJob),
            lcol_selectedLineItems: If(IsBlankOrError(lcol_selectedLineItems), Table(), lcol_selectedLineItems)
        });*/
        UpdateContext({lvar_showPOpopup: false});
        // UI state
        UpdateContext({
            showPoDrawer: false,
            sortBy: "order_date",
            q: "",
            selStatus: "All",
            showPPA: false
        });

        // Formatting helpers (use App.Formulas if you prefer)
        Set(MoneyFmt, "£#,##0.00");
        Set(DateFmt, "dd mmm yyyy");
        Collect(colNavHistory, {Screen: App.ActiveScreen});
        If(CountRows(colNavHistory) > 10, Remove(colNavHistory, First(colNavHistory)));
        Set(varPoId, gvar_Selected_PO.id);
        UpdateContext({ lrecAlloc: Blank() });
        UpdateContext({ varConfirmDelete: false });
        UpdateContext({lvar_showPOPopup: false});

        ClearCollect(
            ColAllocations,
            'mosaic-dev'.dbospGetPoAllocations({
                po_id: gvar_Selected_PO.id,
                period_id: gvar_currentPeriodRecord.id
            }).ResultSets.Table1
        );
