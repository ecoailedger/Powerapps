                                                                        Height: =txtAddAmount_1.Height
                                                                        LayoutMaxHeight: =
                                                                        LayoutMaxWidth: =
                                                                        OnSelect: "=// Handles both adding new allocations and editing existing ones\nWith(\n    {\n        _amt: Value(txtAddAmount_1.Text),\n        _fund: cmb_FundJob_namePO.Selected,\n        _job: cmb_FundJob_JobnamePO.Selected,\n        _isEdit: !IsBlank(lrecAlloc),\n        _oldAmount: If(!IsBlank(lrecAlloc), lrecAlloc.amount, 0),\n        _currentTotal: Sum(galAlloc_1.AllItems, amount),\n        _poTotal: gvar_Selected_PO.total_value_raw\n    },\n    \n    // Validate inputs\n    If(\n        IsBlank(_job) || IsBlank(_amt),\n        Notify(\"Period, Fund, Job, and Amount are all mandatory fields.\", NotificationType.Error),\n        \n        // Validate total allocation doesn't exceed PO value\n        If(\n            (_currentTotal - _oldAmount + _amt) > _poTotal,\n            Notify(\n                \"Allocation exceeds PO value. Total allocated would be £\" & \n                Text(_currentTotal - _oldAmount + _amt, \"#,##0.00\") & \n                \" but PO value is £\" & Text(_poTotal, \"#,##0.00\"),\n                NotificationType.Error\n            ),\n            \n            // All validations passed - proceed with upsert\n            ClearCollect(\n                ColAllocations,\n                'mosaic-dev'.dbospUpsertPoAllocation({\n                    mode: \"PO\",\n                    fund_job_id: _job.id,\n                    po_id: gvar_Selected_PO.id,\n                    period_id: gvar_currentPeriodRecord.id,\n                    amount: _amt,\n                    user_id: User().EntraObjectId,\n                    user_name: User().FullName\n                }).ResultSets.Table1\n            );\n            \n            // Clear edit mode and reset form\n            UpdateContext({ lrecAlloc: Blank() });\n            Reset(cmb_FundJob_namePO);\n            Reset(txtAddAmount_1);\n            SetFocus(txtAddAmount_1);\n            \n            // Show success message\n            Notify(\n                If(_isEdit, \"Allocation updated successfully.\", \"Allocation added successfully.\"),\n                NotificationType.Success\n            )\n        )\n    )\n);"
